<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inmar Store Debug Page</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f6f9;
}
.wrap {
  max-width:900px;
  margin:20px auto;
  padding:20px;
  background:white;
  border-radius:16px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}
h1 { margin-top:0; }
.section {
  margin-top:20px;
  padding:12px;
  border:1px solid #e6e8ee;
  border-radius:12px;
  background:#fafafa;
}
pre {
  white-space:pre-wrap;
  word-break:break-word;
  font-size:12px;
  background:#111;
  color:#0f0;
  padding:10px;
  border-radius:8px;
  overflow:auto;
}
</style>

<script>
function sendHeight() {
  const height = document.documentElement.scrollHeight;
  window.parent.postMessage({ type: "resize", height }, "*");
}
window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);
setTimeout(sendHeight, 500);
setTimeout(sendHeight, 1500);
</script>
</head>

<body>
<div class="wrap">
<h1>🔎 Inmar Store Debug Page</h1>
<p>This page is capturing everything the parent iframe sends.</p>

<div class="section">
<strong>Full URL:</strong>
<pre id="urlOutput"></pre>
</div>

<div class="section">
<strong>Query Parameters:</strong>
<pre id="paramsOutput"></pre>
</div>

<div class="section">
<strong>Document Referrer:</strong>
<pre id="referrerOutput"></pre>
</div>

<div class="section">
<strong>postMessage Events From Parent:</strong>
<pre id="messageOutput">Listening...</pre>
</div>

</div>

<script>
document.getElementById("urlOutput").textContent = window.location.href;

const params = Object.fromEntries(new URLSearchParams(window.location.search));
document.getElementById("paramsOutput").textContent =
  Object.keys(params).length
    ? JSON.stringify(params, null, 2)
    : "No query parameters detected.";

document.getElementById("referrerOutput").textContent =
  document.referrer || "No referrer detected.";

// Listen for parent messages
window.addEventListener("message", (event) => {
  const output = document.getElementById("messageOutput");

  let formatted;
  if (typeof event.data === "string") {
    formatted = event.data;
  } else {
    try {
      formatted = JSON.stringify(event.data, null, 2);
    } catch {
      formatted = "Received non-serializable message.";
    }
  }

  output.textContent =
    "Origin: " + event.origin + "\n\n" + formatted;

  sendHeight();
});
</script>

</body>
</html>

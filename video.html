<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lowe's Foods Events</title>

<style>

body{
margin:0;
background:#f5f5f5;
font-family:Arial, sans-serif;
}

/* Banner */

.banner{
width:100%;
height:350px;
overflow:hidden;
background:white;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* Video wrapper (shrinks video to ~60%) */

.video-wrap{
width:60%;
margin:40px auto;
}

/* Video */

.video{
position:relative;
width:100%;
padding-bottom:56.25%;
height:0;
background:black;
}

.video iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}

</style>

</head>

<body>

<!-- Banner -->

<div class="banner">
<img src="image%20(31).jpg" alt="Fresh Rewards Banner">
</div>

<!-- Video -->

<div class="video-wrap">

<div class="video">
<iframe
src="https://www.youtube.com/embed/hBjlzTVNlng?autoplay=1&mute=1&rel=0&modestbranding=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>

</div>

</body>
</html>

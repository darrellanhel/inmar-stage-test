<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Events Video</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden; /* kill scroll */
    }

    /* Whole page is exactly the viewport */
    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Banner gets a fixed height */
    .banner {
      height: 140px;           /* tweak: 110–160 */
      flex: 0 0 140px;
      background: #fff;
      overflow: hidden;
    }
    .banner img {
      width: 100%;
      height: 100%;
      object-fit: contain;      /* show full banner */
      display: block;
      background: #fff;
    }

    /* Video takes the remaining height */
    .video {
      flex: 1 1 auto;
      background: #000;
      position: relative;
    }
    .video iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="banner">
      <img src="image%20(31).jpg" alt="Fresh Rewards banner">
    </div>

    <div class="video">
      <iframe
        src="https://www.youtube.com/embed/hBjlzTVNlng?autoplay=1&mute=1&rel=0&modestbranding=1"
        allow="autoplay; encrypted-media; fullscreen"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Events Video</title>

<style>
  body { margin: 0; font-family: Arial, sans-serif; background: white; }
  .container { max-width: 980px; margin: 0 auto; }

  .banner {
    width: 100%;
    max-height: 160px;
    overflow: hidden;
    border-bottom: 1px solid #e5e5e5;
  }
  .banner img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .video {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
  }
  .video iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
</style>
</head>

<body>
  <div class="container">
    <div class="banner">
      <img src="image%20(31).jpg" alt="Fresh Rewards banner">
    </div>

    <div class="video">
      <iframe
        src="https://www.youtube.com/embed/hBjlzTVNlng?autoplay=1&mute=1&rel=0&modestbranding=1"
        allow="autoplay; encrypted-media"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>

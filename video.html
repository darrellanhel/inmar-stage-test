<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Events Video</title>
  <style>
    html, body { margin: 0; padding: 0; background: #fff; }

    /* Banner: show the ENTIRE image, no cropping */
    .banner {
      width: 100%;
      background: #fff;
      line-height: 0; /* removes tiny gaps */
    }
    .banner img {
      width: 100%;
      height: auto;        /* preserve aspect ratio */
      display: block;
      object-fit: contain; /* no crop */
    }

    /* Video: responsive 16:9 */
    .video {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;   /* modern + simplest */
      background: #000;
    }
    .video iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="banner">
    <img src="image%20(31).jpg" alt="Fresh Rewards banner">
  </div>

  <div class="video">
    <iframe
      src="https://www.youtube.com/embed/hBjlzTVNlng?autoplay=1&mute=1&rel=0&modestbranding=1"
      allow="autoplay; encrypted-media; fullscreen"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
